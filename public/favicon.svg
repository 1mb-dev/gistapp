<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <style>
    @media (prefers-color-scheme: dark) {
      .bg { fill: #8b94f7; }
      .fg { fill: #0f0e22; }
    }
  </style>
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4a3dc0"/>
      <stop offset="100%" stop-color="#3d32b0"/>
    </linearGradient>
  </defs>
  <rect class="bg" width="32" height="32" rx="8" fill="url(#g)"/>
  <text class="fg" x="50%" y="53%" dominant-baseline="central" text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif" font-size="20" font-style="italic" font-weight="400" fill="#fff">G</text>
</svg>
