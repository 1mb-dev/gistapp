name: Deploy

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      pages_only:
        description: 'Deploy Pages only (skip Worker)'
        type: boolean
        default: false

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@900f2210b1d28bbbd0bd22d17926b9e224e8f231 # v4

      - uses: actions/setup-node@670825a89dc0abd596e7a3abd0f5e3f6e5faf37c # v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run lint
      - run: npm test

  deploy-pages:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@900f2210b1d28bbbd0bd22d17926b9e224e8f231 # v4

      - uses: actions/setup-node@670825a89dc0abd596e7a3abd0f5e3f6e5faf37c # v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v4.0.0
        with:
          apiToken: ${{ secrets.GIST_CF_API_TOKEN }}
          accountId: ${{ secrets.GIST_CF_ACCOUNT_ID }}
          command: pages deploy dist --project-name=gistapp --branch=main

  deploy-worker:
    needs: test
    if: ${{ !inputs.pages_only }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@900f2210b1d28bbbd0bd22d17926b9e224e8f231 # v4

      - uses: actions/setup-node@670825a89dc0abd596e7a3abd0f5e3f6e5faf37c # v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Deploy Worker
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v4.0.0
        with:
          apiToken: ${{ secrets.GIST_CF_API_TOKEN }}
          accountId: ${{ secrets.GIST_CF_ACCOUNT_ID }}
          workingDirectory: worker
          command: deploy
